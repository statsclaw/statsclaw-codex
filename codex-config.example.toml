# Example Codex CLI configuration for StatsClaw-Codex.
#
# This file is NOT copied verbatim. `install.sh` appends the
# `[profiles.statsclaw-*]` blocks below (everything after the banner) into
# the user's existing `~/.codex/config.toml`, preserving their other settings.
#
# If you prefer to configure manually, copy the sections you want into
# `~/.codex/config.toml`.
#
# ============================================================================
# ==== StatsClaw-Codex profiles  (merged by install.sh — everything below) ===
# ============================================================================
#
# NOTE: we intentionally do NOT set `model = "..."` in any of these profiles.
# Each profile inherits whichever model the user has configured as their
# default in Codex CLI. If you have access to a specific tier and want to
# pin it per-role, add `model = "gpt-5-codex"` (or whichever) under the
# profile of interest. Hard-coding a model you don't have access to causes
# `codex exec --profile statsclaw-<role>` to fail with an auth error at
# dispatch time.

# Leader — orchestrates the workflow, dispatches specialist teammates.
# Should have full tool access (git, network, shell) but NOT Write/Edit on the
# target repo (enforced at the protocol level by AGENTS.md + leader.md).
[profiles.statsclaw-leader]
approval_policy = "never"
sandbox_mode = "workspace-write"
disable_response_storage = false

# Planner — reads specs, papers, uploads; produces spec/test-spec/sim-spec.
# Needs web/PDF read access but must not write to target repo.
[profiles.statsclaw-planner]
approval_policy = "never"
sandbox_mode = "workspace-write"

# Builder — implements code from spec.md. Runs inside a git worktree.
# Needs full workspace-write; tool access restricted by agents/builder.md.
[profiles.statsclaw-builder]
approval_policy = "never"
sandbox_mode = "workspace-write"

# Tester — independent validation. Runs language validation commands
# (R CMD check, pytest, npm test, ...). Must NOT write to source code.
[profiles.statsclaw-tester]
approval_policy = "never"
sandbox_mode = "workspace-write"

# Scriber — writes documentation + ARCHITECTURE.md + log-entry.md. Worktree.
[profiles.statsclaw-scriber]
approval_policy = "never"
sandbox_mode = "workspace-write"

# Simulator — writes DGP and Monte Carlo harness from sim-spec.md. Worktree.
# May need significantly more compute; consider a larger model if available.
[profiles.statsclaw-simulator]
approval_policy = "never"
sandbox_mode = "workspace-write"

# Reviewer — read-only convergence check across pipelines.
[profiles.statsclaw-reviewer]
approval_policy = "never"
sandbox_mode = "read-only"

# Distiller — extracts reusable knowledge, applies privacy scrub.
# Reads run artifacts + local brain repo; writes brain-contributions.md only.
[profiles.statsclaw-distiller]
approval_policy = "never"
sandbox_mode = "workspace-write"

# Shipper — git operations + GitHub API. Needs network + push credentials.
[profiles.statsclaw-shipper]
approval_policy = "never"
sandbox_mode = "workspace-write"

# --- MCP servers (optional) --------------------------------------------------
# StatsClaw-Codex works fine without MCP; these are convenience integrations.
#
# [mcp_servers.github]
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-github"]
