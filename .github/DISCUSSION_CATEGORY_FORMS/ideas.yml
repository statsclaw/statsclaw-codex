title: "Ideas & Feature Brainstorm"
labels:
  - "idea"
body:
  - type: markdown
    attributes:
      value: |
        Share your ideas for StatsClaw-Codex! This is the place to brainstorm features,
        discuss use cases, and help shape the roadmap.

        All ideas are welcome — from small improvements to ambitious new capabilities.
        If your idea applies equally to the upstream Claude Code version
        (`statsclaw/statsclaw`), feel free to post there instead (or cross-post).

  - type: textarea
    id: idea
    attributes:
      label: Your idea
      description: What would you like to see in StatsClaw-Codex?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: "Why is this useful? How would you or others benefit?"
    validations:
      required: false
