title: "Ideas & Feature Brainstorm"
labels:
  - "idea"
body:
  - type: markdown
    attributes:
      value: |
        Share your ideas for StatsClaw! This is the place to brainstorm features,
        discuss use cases, and help shape the roadmap.

        All ideas are welcome — from small improvements to ambitious new capabilities.
        Discussions are shared across both runtime distributions
        (`statsclaw/statsclaw` for Claude Code and `statsclaw/statsclaw-codex` for Codex CLI),
        so a single thread reaches users of both.

  - type: textarea
    id: idea
    attributes:
      label: Your idea
      description: What would you like to see in StatsClaw?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: "Why is this useful? How would you or others benefit?"
    validations:
      required: false
