name: "Feature Request"
description: "Suggest a new feature or improvement for StatsClaw"
title: "[Feature]: "
labels: ["enhancement", "community"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Your ideas help shape the [Roadmap](../../ROADMAP.md).

        StatsClaw ships in two runtime distributions (`statsclaw/statsclaw` for Claude Code and `statsclaw/statsclaw-codex` for OpenAI Codex CLI). Roadmaps are coordinated across both — feel free to file on whichever repo matches the runtime you use.

  - type: textarea
    id: description
    attributes:
      label: What would you like StatsClaw to do?
      description: Describe the feature or improvement you'd like to see.
      placeholder: "e.g., Support Julia language profile for generating Julia packages"
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: How would you use this feature? What problem does it solve?
      placeholder: "e.g., I work primarily in Julia and want to generate packages for my estimators"
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of StatsClaw does this relate to?
      options:
        - Agent behavior (leader, planner, builder, tester, etc.)
        - Language profile (R, Python, Stata, etc.)
        - Paper-to-Package pipeline
        - Simulation workflows
        - Documentation & tutorials
        - Brain system & knowledge sharing
        - Codex-specific (dispatch.sh, prompts/, codex-config.example.toml, install.sh)
        - CI/CD & packaging
        - Other
    validations:
      required: true

  - type: dropdown
    id: applies-to
    attributes:
      label: Which distribution(s) should this land in?
      options:
        - "Both — protocol/agent/skill/profile change that applies to both runtimes"
        - "Claude Code only (`statsclaw/statsclaw`)"
        - "Codex CLI only (`statsclaw/statsclaw-codex`)"
        - "Not sure"
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other details, screenshots, or references.
      placeholder: "Links to related papers, examples, etc."
    validations:
      required: false
