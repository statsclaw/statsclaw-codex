name: "Bug Report"
description: "Report something that isn't working correctly"
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please provide enough detail so we can reproduce the issue.

        If this bug also exists on the upstream Claude Code version (`statsclaw/statsclaw`), please mention that — it helps us decide whether to fix here, upstream, or both.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Start a Codex CLI session in a target repo with StatsClaw-Codex installed
        2. Run prompt "..."
        3. See error at step ...
    validations:
      required: true

  - type: dropdown
    id: workflow
    attributes:
      label: Workflow
      description: Which workflow were you running?
      options:
        - Code Change (workflow 1/2)
        - Docs Only (workflow 3)
        - Issue Patrol (workflow 4)
        - Single Issue Fix (workflow 5)
        - Validation (workflow 6)
        - Ship / Review (workflow 7/8)
        - Simulation (workflow 11/12)
        - Simplified (workflow 10)
        - Brain / Knowledge sharing
        - Other / Unknown
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: "OS, Codex CLI version, target language/repo type"
      placeholder: "macOS 14, codex 0.6.x, R package"
    validations:
      required: false

  - type: dropdown
    id: also-upstream
    attributes:
      label: Does this bug also occur on upstream `statsclaw/statsclaw` (Claude Code)?
      options:
        - Yes
        - No
        - Haven't tried
        - Not applicable
    validations:
      required: false
