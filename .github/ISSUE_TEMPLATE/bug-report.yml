name: "Bug Report"
description: "Report a bug or unexpected behavior in StatsClaw"
title: "[Bug]: "
labels: ["bug", "community"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please provide enough detail so we can reproduce the issue.

        StatsClaw ships in two runtime distributions (`statsclaw/statsclaw` for Claude Code and `statsclaw/statsclaw-codex` for OpenAI Codex CLI). If a bug affects both, file it on whichever runtime you encountered it with — the maintainers triage cross-distribution bugs jointly.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the unexpected behavior.
      placeholder: "e.g., The planner agent failed to read my equations PDF."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: Describe what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Start a session in a target repo with StatsClaw installed
        2. Run prompt "..."
        3. See error at step ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / error messages
      description: Paste any relevant logs, error messages, or session output.
      render: shell

  - type: dropdown
    id: area
    attributes:
      label: Which part of StatsClaw?
      options:
        - Agent behavior (leader, planner, builder, tester, etc.)
        - Language profile
        - Brain mode (read or contribute)
        - Workspace sync
        - Installation / setup
        - Documentation
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: runtime
    attributes:
      label: Which runtime did you experience this on?
      options:
        - Claude Code (`statsclaw/statsclaw`)
        - Codex CLI (`statsclaw/statsclaw-codex`)
        - Both
        - Not sure
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: "OS, CLI version, target language/repo type"
      placeholder: "e.g., macOS 14, Claude Code 1.x or codex 0.6.x, R package"
    validations:
      required: false
